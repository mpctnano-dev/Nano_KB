# Site identity shown in the browser tab, header, search metadata, and generated HTML.
site_name: NAU Nano Website Docs
site_description: Maintenance documentation for the NAU Nano public website at nano.nau.edu.
site_author: NAU Nano

# MkDocs reads Markdown from this folder. Keep editable docs source here.
docs_dir: Docs

# Material gives us search, tabs, tags, code copy buttons, dark mode, and a clean docs layout.
theme:
  name: material
  logo: assets/images/NAU.png
  favicon: assets/images/NAU.png
  features:
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font: false

# Search is the built-in site search. Tags creates the generated tag index.
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags
  - awesome-pages

# These Markdown extensions support admonitions, tables, code highlighting, tabs,
# task lists, footnotes, Mermaid diagrams, and richer inline formatting.
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Custom docs-site CSS. This is for the MkDocs website, not the public nano.nau.edu CSS.
extra_css:
  - assets/stylesheets/extra.css

# Hide the default generator text and keep social links empty until the team chooses them.
extra:
  generator: false
  social: []

copyright: Copyright &copy; 2026 Northern Arizona University.

# Navigation is managed by .pages files in each Docs/ subfolder.
# See the awesome-pages plugin: https://github.com/lukasgeiter/mkdocs-awesome-pages-plugin
# To reorder pages, edit the .pages file in the relevant folder.
# New .md files auto-appear in the nav — no need to edit this file.
